name: CI

on:
  push:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      agent_service: ${{ steps.filter.outputs.agent_service }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - "frontend/**"
              - ".github/workflows/ci.yml"
            backend:
              - "backend/**"
              - ".github/workflows/ci.yml"
            agent_service:
              - "agent-service/**"
              - ".github/workflows/ci.yml"

  frontend:
    name: Frontend Lint & Build
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  backend:
    name: Backend Build & Unit Tests
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore
        run: dotnet restore FairWorkly.sln
      - name: Build
        run: dotnet build FairWorkly.sln --configuration Release --no-restore
      - name: Test (Unit)
        run: dotnet test tests/FairWorkly.UnitTests/FairWorkly.UnitTests.csproj --configuration Release --no-build --verbosity normal

  agent-service:
    name: Agent Service Tests
    needs: changes
    if: needs.changes.outputs.agent_service == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pip install "poetry==2.3.2"
      - name: Install dependencies
        run: poetry install --with dev --no-interaction --no-root
      - name: Run tests
        env:
          AGENT_SERVICE_KEY: test-service-key
          PYTHONPATH: ${{ github.workspace }}/agent-service
        run: poetry run pytest tests -q

  fairbot-e2e:
    name: FairBot E2E (Playwright)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Start frontend
        run: |
          npm run dev -- --host 127.0.0.1 --port 5173 >/tmp/fairworkly-frontend.log 2>&1 &
          echo $! > /tmp/fairworkly-frontend.pid
          for _ in {1..60}; do
            if curl -fsS http://127.0.0.1:5173 >/dev/null; then
              echo "Frontend is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Frontend failed to start in time"
          cat /tmp/fairworkly-frontend.log || true
          exit 1
      - name: Run FairBot E2E
        run: npm run test:e2e:fairbot
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-fairbot-report
          path: |
            frontend/playwright-report
            frontend/test-results
      - name: Stop frontend
        if: always()
        run: |
          if [ -f /tmp/fairworkly-frontend.pid ]; then
            kill "$(cat /tmp/fairworkly-frontend.pid)" || true
          fi
