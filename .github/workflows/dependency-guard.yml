name: Dependency Guard

on:
  push:
    paths:
      - "agent-service/**"
      - "Makefile"
      - ".github/workflows/dependency-guard.yml"
  pull_request:
    paths:
      - "agent-service/**"
      - "Makefile"
      - ".github/workflows/dependency-guard.yml"

permissions:
  contents: read

concurrency:
  group: deps-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Check shared rag dependencies
        run: make lint-deps
